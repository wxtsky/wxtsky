    <rect x="96" y="176" width="62" height="26" rx="13" fill="#161b22" stroke="#30363d"/>
    <text x="127" y="193" text-anchor="middle">macOS</text>
    <rect x="168" y="176" width="46" height="26" rx="13" fill="#161b22" stroke="#30363d"/>
    <text x="191" y="193" text-anchor="middle">iOS</text>
    <rect x="224" y="176" width="76" height="26" rx="13" fill="#161b22" stroke="#30363d"/>
    <text x="262" y="193" text-anchor="middle">watchOS</text>
