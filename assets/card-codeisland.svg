<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 224" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1f6feb"/>
      <stop offset="0.6" stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#58a6ff" stop-opacity="0"/>
