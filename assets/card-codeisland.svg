  <text x="28" y="58" font-size="21" font-weight="700" fill="#e6edf3">🏝️ CodeIsland</text>
  <text x="28" y="87" font-size="13.5" fill="#58a6ff">AI coding agents, visible at a glance.</text>

  <text x="28" y="113" font-size="12.5" fill="#8b949e">Live session status, tool calls, approvals &amp; replies for</text>
